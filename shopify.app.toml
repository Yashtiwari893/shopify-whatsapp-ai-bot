# Learn more about the shopify.app.toml file at https://shopify.dev/docs/apps/tools/cli/configuration

name = "AI WhatsApp Chatbot"
client_id = "" # Will be filled by Shopify CLI during 'npm run dev'
application_url = "https://your-app-url.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "" # Your development store URL

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_orders,read_content"

[auth]
redirect_urls = [
  "https://your-app-url.vercel.app/auth/callback",
  "https://your-app-url.vercel.app/auth/shopify/callback",
  "https://your-app-url.vercel.app/api/auth/callback"
]

[pos]
embedded = false
